services:
  garage:
    image: dxflrs/garage:v2.0.0
    volumes:
      - ./garage.toml:/etc/garage.toml
      - garage-storage:/var/lib/garage
    restart: unless-stopped

  garage-webui:
    image: khairul169/garage-webui:1.1.0
    restart: unless-stopped
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
    environment:
      - AUTH_USER_PASS
      - API_BASE_URL
      - S3_ENDPOINT_URL

volumes:
  garage-storage: {}