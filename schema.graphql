input ResourceLimitsInput {
  cpuMilli: Int
  cpuShares: Int
  cpuset: String
  memoryMb: Int
  memoryReservationMb: Int
  nofile: Int
  nproc: Int
  oomScoreAdj: Int
  pidsLimit: Int
  shmSizeMb: Int
