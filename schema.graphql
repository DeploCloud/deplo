type Mutation {
  """
  Add a basic-auth user to an app. Applies to all its domains on the next deploy or Reload.
  """
  addBasicAuthUser(appId: String!, password: String!, username: String!): BasicAuthUser
  addDevSshUser(input: AddDevSshUserInput!): DevSshUser
  addDomain(appId: String!, config: DomainConfigInput, name: String!): Domain

  """Add an already-registered user to the active team."""
  addExistingMember(input: AddMemberInput!): Member

  """Add a registry credential to the active team. Returns true."""
  addRegistry(input: AddRegistryInput!): Boolean
  addServer(input: AddServerInput!): AddServerPayload

  """
  Cancel every in-progress deployment (queued/building) for one app (appId given) or across the whole active team (appId omitted), optionally narrowed to the deployments view filters: one owning server (serverId), one environment, and/or one status. Terminal deployments are left. Returns how many builds were stopped.
  """
  cancelAllDeployments(appId: ID, environment: String, serverId: ID, status: String): Int
  cancelDeployment(id: String!): Boolean

  """
  Change the current user's password after verifying the current one. Returns true.
  """
  changePassword(currentPassword: String!, newPassword: String!): Boolean

  """
  Force an immediate re-resolution of the latest agent release from GitHub, bypassing the in-process cache. Returns the resolved expected agent version so the dashboard re-renders with fresh outdated badges. Use after publishing a new agent release rather than waiting out the cache TTL.
  """
  checkAgentUpdates: String

  """
  Probe every provisioned server's agent and persist each outcome; returns every server (unprovisioned ones pass through untouched). This is what the Servers page runs on load, so a reload always reflects reality rather than the status a server had when it first called home.
  """
  checkAllServerHealth(
    """Bypass the ambient throttle (the header's 'Check all' button)."""
    force: Boolean
  ): [Server!]

  """Re-run the upstream release check and return the latest update info."""
  checkForUpdates: UpdateInfo

  """
  Probe ONE server's agent right now (a live Hello) and persist what it reports: online, warning (agent up, Docker unreachable), error (agent untrusted or broken) or offline. Returns the refreshed server. Throttled server-side even when forced, so it cannot be used to hammer a host; an inconclusive probe leaves the previous observation untouched rather than guessing.
  """
  checkServerHealth(
    """
    Bypass the ambient throttle (the operator asked for this check explicitly). A short floor still applies.
    """
    force: Boolean
    id: String!
  ): Server

  """
  Check whether ONE server's installation is complete enough to run deployments, right now. Dials the agent (Hello), bind-tests host ports 80 and 443, and reads host metrics, then reports what it found: the agent's handshake/protocol/version and which build methods and platform features it supports, whether Docker answers, whether a Traefik container is running and holds the web ports, disk headroom, and this server's team access and deploy concurrency. Never persisted — it does not touch `status`, so it can neither create nor cure a stale badge. Degrades honestly: an agent too old to bind-test ports reports those rows as skipped, never as a pass.
  """
  checkServerReadiness(id: String!): ServerReadinessReport

  """First-run setup: create the first account + team. Signs in."""
  completeSetup(email: String!, name: String!, password: String!, teamName: String!, username: String!): AuthPayload
  createApp(input: CreateAppInput!): App

  """Create a new (empty) folder in the app files tree."""
  createAppDir(appId: String!, path: String!): FileEntry

  """Create a backup schedule. Returns true."""
  createBackup(input: CreateBackupInput!): Boolean
  createDatabase(input: CreateDatabaseInput!): Database

  """Add a custom environment to a Project container."""
  createEnvironment(name: String!, projectId: ID!): Environment

  """
  Create a folder in the active team; nest it by passing a parent folder id. Requires the deploy capability; the creator becomes the folder's owner.
  """
  createFolder(color: String, name: String!, parentId: ID): Folder

  """
  Create a Project container in the active team. Requires `deploy`; the creator becomes its owner.
  """
  createProject(color: String, name: String!): Project
  createS3(input: CreateS3Input!): S3Destination

  """Create a new team; the viewer becomes its owner and it is made active."""
  createTeam(name: String!): Team

  """
  Create a new API token. The raw secret is returned once in the payload.
  """
  createToken(name: String!): CreateTokenPayload

  """
  Delete every finished deployment for one app (appId given) or across the whole active team (appId omitted), optionally narrowed to the deployments view filters: one owning server (serverId), one environment, and/or one status. In-progress deployments are left. Returns how many were deleted.
  """
  deleteAllDeployments(appId: ID, environment: String, serverId: ID, status: String): Int

  """Delete the app and tear down its stack. Returns true."""
  deleteApp(id: String!): Boolean

