  """All Project containers in the active team, in display order."""
  projects: [Project!]

  """Pending + recent registration links, newest first."""
  registrationLinks: [RegistrationLink!]

  """All registry credentials in the active team, newest first."""
  registries: [Registry!]

  """All S3 destinations in the active team, newest first."""
  s3Destinations: [S3Destination!]

  """Search registered users (by username/display name) to add to the team."""
  searchUsers(query: String!): [UserSearchResult!]
  server(id: String!): Server

  """A fresh live metrics snapshot for one server."""
  serverMetrics(serverId: String!): ServerMetrics

  """All servers, by creation order."""
  servers: [Server!]
  service(slug: String!): Service

  """Read a single project file's text body."""
  serviceFile(path: String!, serviceId: String!): FileContent

  """
  List the immediate children of a directory in the service files tree (the root when path is omitted), directories first.
  """
  serviceFiles(path: String, serviceId: String!): [FileEntry!]

  """
  Whether the service has an on-disk files directory (drives the Files tab).
  """
