  """
  Per-event delivery map (deployment_failed, server_offline, …) -> boolean.
  """
  events: JSON
}

"""
A top-level, team-scoped CONTAINER (ADR-0008): folder-like, but it owns Environments and holds folders/services via their `projectId`. NOT the deployable app — that is a `Service`. A Project never nests in a Project.
"""
type Project {
  color: String
  createdAt: String
  environmentCount: Int
  environments: [Environment!]
  folderCount: Int
  id: ID
  name: String
  ownerUserId: ID
  serviceCount: Int
  slug: String
  teamId: ID
  updatedAt: String
}

type Query {
  """Recent activity in the active team, newest first."""
  activity(limit: Int): [Activity!]

  """Fresh live metrics snapshots for every server."""
  allServerMetrics: [ServerMetrics!]

  """Every service's env vars in the active team, grouped by project."""
  allServiceEnv: [ServiceEnvGroup!]

  """
  Every team in the instance, for the instance-admin registration-link team picker.
  """
  allTeamsForAdmin: [Team!]

  """Every registered user on the instance (no email)."""
