input MintRegistrationLinkInput {
  mode: RegistrationMode!
  teamAssignments: [RegistrationTeamAssignmentInput!]
}

"""A config file a template materialises into its stack at deploy."""
input MountInput {
  content: String!
  filePath: String!
}

type Mutation {
  """
  Add a basic-auth user to a service. Applies to all its domains on the next deploy or Reload.
  """
  addBasicAuthUser(password: String!, serviceId: String!, username: String!): BasicAuthUser
  addDevSshUser(input: AddDevSshUserInput!): DevSshUser
  addDomain(config: DomainConfigInput, name: String!, serviceId: String!): Domain

  """Add an already-registered user to the active team."""
  addExistingMember(input: AddMemberInput!): Member

  """Add a registry credential to the active team. Returns true."""
  addRegistry(input: AddRegistryInput!): Boolean
  addServer(input: AddServerInput!): AddServerPayload
  cancelDeployment(id: String!): Boolean

  """
  Change the current user's password after verifying the current one. Returns true.
  """
  changePassword(currentPassword: String!, newPassword: String!): Boolean

  """
  Force an immediate re-resolution of the latest agent release from GitHub, bypassing the in-process cache. Returns the resolved expected agent version so the dashboard re-renders with fresh outdated badges. Use after publishing a new agent release rather than waiting out the cache TTL.
  """
  checkAgentUpdates: String

  """Re-run the upstream release check and return the latest update info."""
  checkForUpdates: UpdateInfo

  """First-run setup: create the first account + team. Signs in."""
  completeSetup(email: String!, name: String!, password: String!, teamName: String!, username: String!): AuthPayload

  """Create a backup schedule. Returns true."""
  createBackup(input: CreateBackupInput!): Boolean
  createDatabase(input: CreateDatabaseInput!): Database

  """Add a custom environment to a Project container."""
  createEnvironment(name: String!, projectId: ID!): Environment

  """
  Create a folder in the active team; nest it by passing a parent folder id. Requires the deploy capability; the creator becomes the folder's owner.
  """
  createFolder(color: String, name: String!, parentId: ID): Folder

  """
  Create a Project container in the active team. Requires `deploy`; the creator becomes its owner.
  """
  createProject(color: String, name: String!): Project
  createS3(input: CreateS3Input!): S3Destination
  createService(input: CreateServiceInput!): Service

  """Create a new (empty) folder in the service files tree."""
  createServiceDir(path: String!, serviceId: String!): FileEntry

  """Create a new team; the viewer becomes its owner and it is made active."""
  createTeam(name: String!): Team

  """
  Create a new API token. The raw secret is returned once in the payload.
  """
  createToken(name: String!): CreateTokenPayload

  """Delete a backup schedule. Returns true."""
  deleteBackup(id: String!): Boolean

  """
  Delete ALL of a target's S3 backup artifacts (across every destination it ran to) plus their run records. The 'also delete backups' branch of deleting a database or project. Returns the number of objects removed. Throws if any destination's sweep failed (so the caller can abort the target deletion rather than orphan bucket objects).
  """
  deleteBackupArtifacts(targetId: String!, targetKind: BackupTargetKind!): Int

  """Tear down the database container + volume. Returns true."""
  deleteDatabase(id: String!): Boolean

  """Delete an env var. Returns true."""
  deleteEnv(id: String!): Boolean

  """
  Delete a non-default environment (never the default or the last remaining one).
  """
  deleteEnvironment(id: ID!): Boolean

  """Delete an environment-scoped shared variable. Returns true."""
  deleteEnvironmentEnv(id: String!): Boolean

  """Delete a folder; its services fall back to the top level."""
  deleteFolder(id: ID!): Boolean

  """Delete an instance-wide variable. Returns true."""
  deleteInstanceEnv(id: String!): Boolean

  """
  Delete a Project container; its folders and services fall back to the team top level (not deleted).
  """
  deleteProject(id: ID!): Boolean

  """Delete a registry credential. Returns true."""
  deleteRegistry(id: String!): Boolean

  """Delete the S3 destination and its backups. Returns true."""
  deleteS3(id: String!): Boolean

  """Delete the service and tear down its stack. Returns true."""
  deleteService(id: String!): Boolean

  """Delete a file or folder (recursively). Returns true."""
  deleteServiceFile(path: String!, serviceId: String!): Boolean

  """
  Bulk-delete several services (bounded-concurrency teardown + one write). Returns how many were deleted.
  """
  deleteServices(ids: [ID!]!): Int

  """Delete a shared env group. Returns true."""
  deleteSharedEnvGroup(id: String!): Boolean

  """
  Permanently delete a team. teamId must be the ACTIVE team (the delete fails closed if the active team changed since the page was loaded). Removes every team-scoped record; the service/database stack teardown continues in the background. Founder or instance admin only; the caller's last team can't be deleted. Returns true.
  """
  deleteTeam(teamId: String!): Boolean

  """Delete a team-global variable. Returns true."""
  deleteTeamGlobalEnv(id: String!): Boolean

  """
  Deploy the current dev workspace files to production. Returns the deployment id.
  """
  deployDevWorkspace(serviceId: String!): String
  disableDev(serviceId: String!): DevInfo
  enableDev(serviceId: String!): DevInfo

  """
  Run a command in the service's live container (docker exec). Gated on the deploy capability — this is arbitrary code execution.
  """
  execConsole(input: ExecConsoleInput!): ExecResult

  """
  Suggest a host port that is currently free on the target server, for the database 'Expose publicly' flow. Requires the publish-ports grant.
  """
  generateAvailableDbPort(serverId: ID): Int

  """Bulk-import a .env-style blob; returns the number of vars imported."""
  importEnv(blob: String!, serviceId: String!, targets: [EnvTarget!]!): Int

  """
  Install an app from the catalog (one per app per team; recreates the container in place if already installed). Mints no token — the caller supplies their own from Settings → API Tokens.
  """
  installApp(catalogId: String!): InstalledApp

  """Sign in with email + password. Sets the session cookie."""
  login(email: String!, password: String!): AuthPayload

  """Clear the session + active-team cookies."""
  logout: Boolean

  """
  Mint a single-use registration link. Returns the absolute /register URL.
  """
  mintRegistrationLink(input: MintRegistrationLinkInput!): String

  """
  Move a folder under a new parent folder, or to the top level when parentId is omitted/null. Rejects moving a folder into itself or a descendant.
  """
  moveFolder(id: ID!, parentId: ID): Boolean

  """
  Move a service into a specific environment of a Project (ADR-0009: each environment holds its own services). The service's project follows the environment.
  """
  moveServiceToEnvironment(environmentId: ID!, serviceId: ID!): Boolean

  """
  Move a service into a folder, or back to the top level when folderId is omitted/null.
  """
  moveServiceToFolder(folderId: ID, serviceId: ID!): Boolean

  """
  Move a service into a Project (landing in its default environment), or back to the top level when projectId is omitted/null.
  """
  moveServiceToProject(projectId: ID, serviceId: ID!): Boolean

  """
  Bulk-move several services into a folder (or to the top level when folderId is omitted/null) in one write. Returns how many moved.
  """
  moveServicesToFolder(folderId: ID, serviceIds: [ID!]!): Int

  """Promote a preview deployment to production."""
  promoteDeployment(id: String!): Boolean
  rebuildService(id: String!): Service
  redeploy(serviceId: String!): Deployment

  """
  Create a new account + team via a single-use registration link. Signs in.
  """
  registerThroughLink(email: String!, name: String!, password: String!, teamName: String, token: String!, username: String!): AuthPayload

  """
  Mint a fresh install command for a server still provisioning (the original token expired or was lost).
  """
  reissueServerBootstrap(id: String!): AddServerPayload

  """
  Re-apply the service's routing (domains + basic auth) to the running stack without a rebuild. Returns 'rerouted', 'unchanged', or 'deferred'.
  """
  reloadService(id: String!): String

  """Remove a basic-auth user. Returns true."""
  removeBasicAuthUser(id: String!): Boolean

  """Remove a dev SSH user. Returns true."""
  removeDevSshUser(id: String!): Boolean

  """Remove the domain so it stops routing. Returns true."""
  removeDomain(id: String!): Boolean

  """
  Revoke a user's access to a folder. Owner/admin only. Returns the fresh grant list.
  """
  removeFolderGrant(folderId: ID!, userId: ID!): [FolderGrant!]

  """Disconnect a GitHub App and its installations. Returns true."""
  removeGithubApp(id: String!): Boolean

  """Remove a member from the active team. Returns true."""
  removeMember(userId: String!): Boolean

  """
  Disconnect and remove a remote server (revokes trust, best-effort teardown). Returns a warning string if the agent was unreachable, else null.
  """
  removeServer(id: String!): String

  """Rename an environment."""
  renameEnvironment(id: ID!, name: String!): Boolean

  """Rename a folder."""
  renameFolder(id: ID!, name: String!): Boolean

  """Rename a Project container."""
  renameProject(id: ID!, name: String!): Boolean
  renameService(id: String!, name: String!): Service

  """Rename or move a file/folder within the service files tree."""
  renameServiceFile(newPath: String!, path: String!, serviceId: String!): FileEntry

  """Render the docker-compose stack a service would deploy."""
  renderComposeStack(serviceId: String!): String

  """Set the team-wide display order of folders in Overview."""
  reorderFolders(folderIds: [ID!]!): Boolean

  """Set the team-wide display order of Project containers."""
  reorderProjects(projectIds: [ID!]!): Boolean

  """Set the team-wide display order of services in Overview."""
  reorderServices(serviceIds: [ID!]!): Boolean

  """DESTRUCTIVE: replace the workspace with a fresh copy of the source."""
  resetDevWorkspace(serviceId: String!): DevInfo

  """
  Restore a backup run in place (overwrites the live target). Returns true.
  """
  restoreBackup(runId: String!): Boolean

  """Reveal the full (unmasked) connection string for a database."""
  revealConnection(id: String!): String

  """Reveal a single secret's plaintext value."""
  revealEnv(id: String!): String

  """Reveal an environment-scoped secret's plaintext value."""
  revealEnvironmentEnv(id: String!): String

  """Reveal an instance-wide secret's plaintext value."""
  revealInstanceEnv(id: String!): String

  """
  Reveal the decrypted `.env` text for one shared group (prefills edits).
  """
  revealSharedEnvBlob(id: String!): String

  """Reveal a team-global secret's plaintext value."""
  revealTeamGlobalEnv(id: String!): String

  """Revoke a pending registration link. Returns true."""
  revokeRegistrationLink(id: String!): Boolean

  """Revoke (delete) an API token. Returns true."""
  revokeToken(id: String!): Boolean

  """Run a backup schedule manually now. Returns true."""
  runBackup(id: String!): Boolean

  """
  Run an ad-hoc backup of a service now (no owning schedule). Returns true.
  """
  runServiceBackup(destinationId: String!, serviceId: String!): Boolean

  """Replace the active team's notification settings."""
  saveNotificationSettings(input: JSON!): NotificationSettings

  """Create or update a shared env group; returns the saved group."""
  saveSharedEnvGroup(input: SaveSharedEnvGroupInput!): SharedEnvGroup
  setDatabaseRunning(id: String!, running: Boolean!): Database

  """Make an environment the project's default (unsets the previous one)."""
  setDefaultEnvironment(id: ID!): Boolean

  """
  Set the git branch an environment builds from (empty ⇒ the service's default branch).
  """
  setEnvironmentBranch(branch: String!, id: ID!): Boolean

  """
  Set a folder's accent colour (hex, e.g. #3b82f6), or clear it back to the default when color is omitted/null.
  """
  setFolderColor(color: String, id: ID!): Boolean

  """
  Grant (or replace) a user's capabilities on a folder. Bounded by both the granter's and the grantee's caps; owner/admin only. Returns the fresh grant list.
  """
  setFolderGrant(capabilities: [String!]!, folderId: ID!, userId: ID!): [FolderGrant!]

  """Make this domain its service's primary (canonical) host. Returns true."""
  setPrimaryDomain(id: String!): Boolean

  """
  Set a Project container's accent colour (hex), or clear it when color is omitted/null.
  """
  setProjectColor(color: String, id: ID!): Boolean

  """
  Set a server's team access. allTeams: true makes it available to every team; false restricts it to teamIds. Blocked (clear error) when a team that still has services or databases on the server would lose access.
  """
  setServerTeams(input: SetServerTeamsInput!): Server
  setServiceAutoDeploy(id: String!, value: Boolean!): Service

  """
  Replace a service's whole env set from the .env editor (upsert the given entries, delete the rest). New vars default to plain; unchanged secrets are preserved. Returns the resulting variable count.
  """
  setServiceEnv(defaultTargets: [EnvTarget!]!, entries: [EnvEntryInput!]!, serviceId: String!): Int

  """
  Replace a single-container service's volumes (named, service-files, and host bind mounts).
  """
  setServiceVolumes(id: String!, volumes: [VolumeInput!]!): Service

  """Attach or detach a shared group to one project. Returns true."""
  setSharedEnvGroupAttachment(attached: Boolean!, groupId: String!, serviceId: String!): Boolean

  """Start a stopped app's container. Returns true."""
  startApp(id: String!): Boolean
  startDev(serviceId: String!): DevInfo

  """
  Begin the GitHub App manifest flow; returns the form's POST target, manifest and signed state.
  """
  startGithubConnect(org: String): GithubConnectStart
  startService(id: String!): Service

  """Start the VS Code tunnel and return the device-login link."""
  startTunnel(serviceId: String!): VscodeTunnelInfo

  """Stop a running app's container. Returns true."""
  stopApp(id: String!): Boolean
  stopDev(serviceId: String!): DevInfo
  stopService(id: String!): Service

  """Stop the VS Code tunnel (dev container keeps running). Returns true."""
  stopTunnel(serviceId: String!): Boolean

  """Switch the active team (sets a cookie server-side). Returns true."""
  switchTeam(teamId: String!): Boolean

  """Send a one-off test alert through a single channel. Returns true."""
  testNotification(channel: TestNotificationChannel!): Boolean

  """Run a connectivity check (HEAD bucket) and return the dest."""
  testS3(id: String!): S3Destination

  """Enable or disable a backup schedule. Returns true."""
  toggleBackup(enabled: Boolean!, id: String!): Boolean

  """
  Uninstall an app: destroy its container + Traefik router and drop the row. Revokes nothing (the app held no token). Returns true.
  """
  uninstallApp(id: String!): Boolean

  """
  Edit a backup schedule's name, destination, cron and retention. The target it backs up is fixed at creation and cannot be changed. Returns true.
  """
  updateBackup(id: String!, input: UpdateBackupInput!): Boolean

  """Change a basic-auth user's password."""
  updateBasicAuthUserPassword(id: String!, password: String!): BasicAuthUser

  """
  Edit a database's public exposure (publish/unpublish + host port) and, optionally, the server it runs on. An in-place edit re-renders the compose and reroutes the container on its current host (data volume preserved). A server change recreates the container fresh on the new host — like a project move, its data does NOT follow (a Docker volume is host-local) — and tears down the old host's stack. The connection string is re-derived. Everything else is create-only. The publish-ports grant is enforced in the data layer when exposure is turned on.
  """
  updateDatabase(id: String!, input: UpdateDatabaseInput!): Database
  updateDev(patch: UpdateDevInput!, serviceId: String!): DevInfo

  """
  Apply a full edit to a domain and return the updated domain (reloaded).
  """
  updateDomain(id: String!, patch: DomainPatchInput!): Domain

  """
  Change the current user's email after re-checking their password. Returns true.
  """
  updateEmail(currentPassword: String!, email: String!): Boolean

  """Change a member's role and/or capabilities."""
  updateMember(input: UpdateMemberInput!): Member

  """Update the current user's display name. Returns true."""
  updateProfile(name: String!): Boolean

  """
  Update this server's agent binary in place to the latest released version WITHOUT reissuing its certificates — the agent self-updates over its existing pinned-mTLS channel and re-execs keeping the same on-disk trust materials, so the server stays online with the same identity. Returns the version the agent is now running. Errors clearly when the server is unreachable/unprovisioned, or — until the agent ships the self-update RPC — when its agent is too old to update itself remotely (re-run the installer to upgrade it for now).
  """
  updateServerAgent(id: String!): String
  updateServiceBuild(build: BuildConfigInput!, id: String!): Service
  updateServiceLogo(id: String!, logo: String): Service
  updateServiceSource(id: String!, input: UpdateSourceInput!): Service
  updateTeam(input: UpdateTeamInput!): Team

  """Edit a user's instance-admin flag, suspended state, and password."""
  updateUserAdmin(input: UpdateUserAdminInput!): UserDetail

  """Upload a file from a base64 body (used for binary files)."""
  uploadServiceFile(base64: String!, path: String!, serviceId: String!): FileEntry

  """Create or update an env var, then return the stored entity."""
  upsertEnv(input: UpsertEnvInput!): EnvVar

  """
  Create or update an environment-scoped shared variable; returns the entity.
  """
  upsertEnvironmentEnv(input: UpsertEnvironmentEnvInput!): EnvironmentEnvVar

  """
  Create or update an instance-wide variable (every team). Instance admin only.
  """
  upsertInstanceEnv(input: UpsertGlobalEnvInput!): GlobalEnvVar

  """Create or update a team-global variable; returns the entity."""
  upsertTeamGlobalEnv(input: UpsertGlobalEnvInput!): GlobalEnvVar

  """Re-check the domain's DNS and (re)issue its certificate."""
  verifyDomain(id: String!): Domain

  """Create or overwrite a text file in the service files tree."""
  writeServiceFile(content: String!, path: String!, serviceId: String!): FileEntry
}

"""Per-team notification channels + per-event delivery toggles."""
