  """
  Per-event delivery map (deployment_failed, server_offline, …) -> boolean.
  """
  events: JSON
}

"""A deployable application owned by a team."""
type Project {
  autoDeploy: Boolean
  compose: String
  createdAt: String

  """All deployments of this project, newest first."""
  deployments: [Deployment!]
  dockerImage: String
  domainCount: Int
  folderId: ID
  framework: String
  id: ID
  latestDeployment: Deployment
  logo: String
  name: String
  productionUrl: String
  serverId: ID
  slug: String
  source: DeploySource
  status: ProjectStatus
  teamId: ID
  updatedAt: String

  """Persistent named volumes (single-container projects only)."""
  volumes: [Volume!]
}

"""One project together with all of its env vars."""
type ProjectEnvGroup {
  project: ProjectEnvGroupProject
  vars: [EnvVar!]
}

type ProjectEnvGroupProject {
  id: ID
  name: String
  slug: String
}

"""An initial environment variable for a new project."""
input ProjectEnvInput {
  key: String!
  value: String!
}

"""A shared env group as seen from one project, with attachment state."""
type ProjectSharedEnvGroup {
  attached: Boolean
  description: String
  id: ID
  keys: [String!]
  name: String
  targets: [EnvTarget!]
}

enum ProjectStatus {
  active
  building
  error
  idle
  queued
  stopping
}

type Query {
  """Recent activity in the active team, newest first."""
  activity(limit: Int): [Activity!]

  """Every project's env vars in the active team, grouped by project."""
  allProjectEnv: [ProjectEnvGroup!]

  """Fresh live metrics snapshots for every server."""
  allServerMetrics: [ServerMetrics!]

  """Every registered user on the instance (no email)."""
  allUsers: [GlobalUser!]

  """
  Diagnostic: how the request authenticated and the active team. Useful when testing token auth.
  """
  apiContext: JSON

  """All API tokens in the active team."""
  apiTokens: [ApiToken!]

  """The remote catalog of installable apps."""
  appCatalog: [AppListing!]

  """All backup schedules in the active team, newest first."""
  backups: [Backup!]

  """Attachable instances + default target for a project's console."""
  consoleInfo(projectId: String!): ConsoleInfo
  database(id: String!): Database

  """All databases in the active team, newest first."""
  databases: [Database!]
  deployment(id: String!): Deployment
  deployments(environment: DeploymentEnvironment, projectId: String, status: DeploymentStatus): [Deployment!]

  """Whether dev mode is available for a given deploy source."""
  devEligible(source: DeploySource!): Boolean

  """Dev config + computed preview URL for a project."""
  devInfo(projectId: String!): DevInfo

  """SSH credentials for a project's dev container."""
  devSshUsers(projectId: String!): [DevSshUser!]

  """
  Domains in the active team, primary first. Optionally filtered to one project.
  """
  domains(projectId: String): [Domain!]

  """Env vars of a single project (requires manage_env)."""
  env(projectId: String!): [EnvVar!]

  """All folders in the active team, in display order."""
  folders: [Folder!]

  """Connected GitHub Apps in the active team."""
  githubApps: [GithubApp!]

  """Branch names for a repo accessible to an installation."""
  githubBranches(fullName: String!, installationId: String!): [String!]

  """Installations of the active team's connected Apps."""
  githubInstallations: [GithubInstallation!]

  """Repositories accessible to a GitHub App installation."""
  githubRepos(installationId: String!): [GithubRepo!]

  """Apps the active team has installed, newest first, with live status."""
  installedApps: [InstalledApp!]

  """Lighter instance list for the logs viewer."""
  logsInfo(projectId: String!): LogsInfo

  """
  The authenticated viewer, or null when unauthenticated. Works with a session cookie or an API token.
  """
  me: Viewer

  """Members of the active team, oldest first."""
  members: [Member!]

  """Every team the viewer belongs to, for the team switcher."""
  myTeams: [TeamMembership!]

  """The active team's notification settings (defaults if unset)."""
  notificationSettings: NotificationSettings

  """
  The first server available, or null when none has been added/provisioned yet.
  """
  primaryServer: Server
  project(slug: String!): Project

  """Read a single project file's text body."""
  projectFile(path: String!, projectId: String!): FileContent

  """
  List the immediate children of a directory in the project files tree (the root when path is omitted), directories first.
  """
  projectFiles(path: String, projectId: String!): [FileEntry!]

  """
  Whether the project has an on-disk files directory (drives the Files tab).
  """
  projectFilesExist(projectId: String!): Boolean

  """All projects in the active team, newest first."""
  projects: [Project!]

  """Pending + recent registration links, newest first."""
  registrationLinks: [RegistrationLink!]

  """All registry credentials in the active team, newest first."""
  registries: [Registry!]

  """All S3 destinations in the active team, newest first."""
  s3Destinations: [S3Destination!]

  """Search registered users (by username/display name) to add to the team."""
  searchUsers(query: String!): [UserSearchResult!]
  server(id: String!): Server

  """A fresh live metrics snapshot for one server."""
  serverMetrics(serverId: String!): ServerMetrics

  """All servers, by creation order."""
  servers: [Server!]

  """All shared env groups in the active team, A→Z."""
  sharedEnvGroups: [SharedEnvGroup!]

  """Shared env groups annotated with whether they attach to one project."""
  sharedEnvGroupsForProject(projectId: String!): [ProjectSharedEnvGroup!]

  """
  The default (or chosen) container's shell label, e.g. "/bin/sh" or "raw exec (no shell)".
  """
  shellLabel(input: ShellLabelInput!): String

  """Current VS Code tunnel status for a project."""
  tunnel(projectId: String!): VscodeTunnelInfo

  """
  Check the upstream repository for a newer Deplo release; cached for an hour.
  """
  updateInfo: UpdateInfo

  """Full detail (incl. email) for one user."""
  userDetail(userId: String!): UserDetail

  """The active team."""
  viewerTeam: Team
}

"""A single-use link to register a new account + owner team."""
type RegistrationLink {
  createdAt: String
  createdBy: String
  expiresAt: String
  id: ID
  status: RegistrationLinkStatus
  usedByUsername: String
}

enum RegistrationLinkStatus {
  pending
  revoked
  used
}

"""
A container-image registry credential owned by a team. The password / access token is never exposed — only the connection metadata.
"""
type Registry {
  createdAt: String
  id: ID
  name: String
  registryUrl: String
  type: RegistryType
  username: String
}

enum RegistryType {
  dockerhub
  generic
  ghcr
  gitlab
}

enum Role {
  member
  owner
  viewer
}

"""An S3-compatible storage destination owned by a team (secrets masked)."""
type S3Destination {
  accessKeyMasked: String
  bucket: String
  createdAt: String
  endpoint: String
  id: ID
  name: String
  provider: S3Provider
  region: String
  status: S3Status
  teamId: ID
}

enum S3Provider {
  AWS
  BACKBLAZE_B2
  CLOUDFLARE_R2
  DIGITALOCEAN
  MINIO
  OTHER
  WASABI
}

enum S3Status {
  connected
  error
  unverified
}

"""
Create (omit id) or update (provide id) a shared env group. The blob is raw `.env` text; secret-looking keys are masked automatically.
"""
input SaveSharedEnvGroupInput {
  blob: String!
  description: String!
  id: String
  name: String!
  projectIds: [ID!]!
  targets: [EnvTarget!]!
}

"""A connected host running deployments (reached via its agent)."""
type Server {
  """
  True when this server's reported agent version is strictly older than expectedAgentVersion. False for an unseen agent or a non-semver/dev version we can't confidently compare.
  """
  agentOutdated: Boolean
  agentPort: Int

  """
  The agent binary version last reported by this server on its last Hello. Null until the server's agent has called home and been provisioned.
  """
  agentVersion: String
  cpuCores: Int
  cpuUsage: Int
  createdAt: String
  diskGb: Int
  diskUsage: Int
  dockerVersion: String

  """
  The agent version this server should be running — the latest GitHub release of the agent (DeploCloud/deplo-agent). Resolved at request time and cached; falls back to a built-in version when GitHub is unreachable.
  """
  expectedAgentVersion: String
  host: String
  id: ID
  ip: String

  """Heartbeat cache (P5) — a hint, not the source of truth."""
  lastSeenAt: String
  memoryMb: Int
  memoryUsage: Int
  name: String

  """True once the server's agent has called home and been trusted."""
  provisioned: Boolean
  status: ServerStatus
  traefikEnabled: Boolean
  type: ServerType
}

"""
A live resource-usage snapshot for one server (CPU, memory, disk, network, load and running-container count).
"""
type ServerMetrics {
  agentOutdated: Boolean
  agentVersion: String
  containers: Int
  cpu: Float
  cpuCores: Int
  diskPct: Float
  diskTotal: Float
  diskUsed: Float
  expectedAgentVersion: String

  """Load averages over [1m, 5m, 15m]."""
  load: [Float!]
  memPct: Float
  memTotal: Float
  memUsed: Float
  netRx: Float
  netTx: Float
  online: Boolean
  serverId: ID
  traefik: Boolean
  ts: Float
  uptimeSec: Int
}

enum ServerStatus {
  error
  offline
  online
  provisioning
}

enum ServerType {
  remote
}

"""A reusable group of environment variables shared across projects."""
type SharedEnvGroup {
  description: String
  id: ID
  name: String
  projectIds: [ID!]

  """Projects this group is attached to."""
  projects: [SharedEnvGroupProject!]

  """Deploy environments this group applies to."""
  targets: [EnvTarget!]
  updatedAt: String
  variables: [SharedEnvVar!]
}

type SharedEnvGroupProject {
  id: ID
  name: String
  slug: String
}

"""A single shared environment variable; secret values are masked."""
type SharedEnvVar {
  key: String
  masked: Boolean
  type: String
  value: String
}

input ShellLabelInput {
  containerName: String
  projectId: String!
}

type Subscription {
  """
  Emits the project whenever its status (power / deployment) changes. Fires once immediately with the current snapshot, then on every change.
  """
  projectStatus(slug: String!): Project
}

"""A team that owns projects, infra and members."""
type Team {
  createdAt: String
  id: ID
  name: String
  plan: TeamPlan
  slug: String
}

"""A team the viewer belongs to, carrying their role and the team size."""
type TeamMembership {
  createdAt: String
  id: ID
  memberCount: Int
  name: String
  plan: TeamPlan
  role: String
  slug: String
}

enum TeamPlan {
  enterprise
  pro
}

enum TestNotificationChannel {
  discord
  email
  webhook
}

"""Partial dev config patch; only the provided fields are changed."""
input UpdateDevInput {
  devCommand: String
  image: String
  imageKind: DevImageKind
  port: Int
  previewEnabled: Boolean
}

"""
Result of checking the upstream GitHub repository for a newer Deplo release.
"""
type UpdateInfo {
  checkedAt: String
  current: String
  error: String
  latest: String
  name: String
  publishedAt: String
  updateAvailable: Boolean
  url: String
}

input UpdateMemberInput {
  capabilities: [Capability!]
  role: Role!
  userId: String!
}

input UpdateSourceInput {
  compose: String
  dockerImage: String
  expose: ExposeInput
  exposes: [ExposeInput!]
  repo: GitRepoInput
  serverId: String
  source: DeploySource!
}

input UpdateTeamInput {
  name: String!
  slug: String!
}

input UpdateUserAdminInput {
  canExposePorts: Boolean
  canMountHostVolumes: Boolean
  isInstanceAdmin: Boolean!
  newPassword: String
  suspended: Boolean!
  userId: String!
}

input UpsertEnvInput {
  key: String!
  projectId: String!
  targets: [EnvTarget!]!
  type: EnvVarType!
  value: String!
}

type UserActivity {
  createdAt: String
  message: String
}

"""
Full per-user detail for the admin editor — the email IS included here.
"""
type UserDetail {
  avatarColor: String
  canExposePorts: Boolean
  canMountHostVolumes: Boolean
  createdAt: String
  email: String
  isInstanceAdmin: Boolean
  name: String
  recentActivity: [UserActivity!]
  suspended: Boolean
  teams: [UserDetailTeam!]
  userId: ID
  username: String
}

type UserDetailTeam {
  role: Role
  teamId: ID
  teamName: String
}

"""
A registered user matched by username/display name when adding members.
"""
type UserSearchResult {
  avatarColor: String
  name: String
  teamName: String
  userId: ID
  username: String
}

"""The authenticated principal for the current request."""
type Viewer {
  avatarColor: String
  email: String
  id: ID
  isInstanceAdmin: Boolean
  name: String
  role: String
  username: String
}

"""
A persistent volume mounted into a single-container project — a docker named volume, a project-files bind, or a host bind mount.
"""
type Volume {
  hostPath: String
  id: ID
  mountPath: String
  name: String
  projectPath: String
  readOnly: Boolean
  type: String
}

"""A persistent volume for a single-container project."""
input VolumeInput {
  hostPath: String
  id: String
  mountPath: String!
  name: String
  projectPath: String
  readOnly: Boolean
  type: String
}

"""VS Code Remote Tunnel status for a project's dev container."""
type VscodeTunnelInfo {
  connected: Boolean
  log: String
  loginCode: String
  loginUrl: String
  running: Boolean
  tunnelUrl: String
}
