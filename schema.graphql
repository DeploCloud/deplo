  """Attachable instances + default target for a service's console."""
  consoleInfo(serviceId: String!): ConsoleInfo
  database(id: String!): Database

  """All databases in the active team, newest first."""
  databases: [Database!]
  deployment(id: String!): Deployment
  deployments(environment: DeploymentEnvironment, serviceId: String, status: DeploymentStatus): [Deployment!]

  """Whether dev mode is available for a given deploy source."""
  devEligible(source: DeploySource!): Boolean

  """Dev config + computed preview URL for a service."""
  devInfo(serviceId: String!): DevInfo

  """SSH credentials for a service's dev container."""
  devSshUsers(serviceId: String!): [DevSshUser!]

  """
  Domains in the active team, primary first. Optionally filtered to one project.
  """
  domains(serviceId: String): [Domain!]

  """Env vars of a single project (requires manage_env)."""
  env(serviceId: String!): [EnvVar!]

  """
  One environment's shared variables — injected into every service of the owning Project, in that environment's context.
  """
  environmentEnv(environmentId: ID!): [EnvironmentEnvVar!]

  """The environments of a Project container, in display order."""
  environments(projectId: ID!): [Environment!]

  """
  Who can access a folder — its owner plus every user it's shared with. Owner/admin only.
  """
  folderGrants(folderId: ID!): [FolderGrant!]

  """
  Team members who could be granted access to a folder (not the owner, not already granted). Owner/admin only.
  """
  folderShareCandidates(folderId: ID!, query: String): [FolderShareCandidate!]

  """All folders in the active team, in display order."""
  folders: [Folder!]

  """Connected GitHub Apps in the active team."""
  githubApps: [GithubApp!]

  """Branch names for a repo accessible to an installation."""
  githubBranches(fullName: String!, installationId: String!): [String!]

  """Installations of the active team's connected Apps."""
  githubInstallations: [GithubInstallation!]

  """Repositories accessible to a GitHub App installation."""
  githubRepos(installationId: String!): [GithubRepo!]

  """
  The capabilities the caller may hand out on a folder (their own effective folder caps). Owner/admin only.
  """
  grantableFolderCapabilities(folderId: ID!): [String!]

  """Apps the active team has installed, newest first, with live status."""
