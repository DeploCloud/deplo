  userId: ID
  username: String
}

"""A config file a template materialises into its stack at deploy."""
input MountInput {
  content: String!
  filePath: String!
}

type Mutation {
  addDevSshUser(input: AddDevSshUserInput!): DevSshUser
  addDomain(config: DomainConfigInput, name: String!, projectId: String!): Domain

  """Add an already-registered user to the active team."""
  addExistingMember(input: AddMemberInput!): Member

  """Add a registry credential to the active team. Returns true."""
  addRegistry(input: AddRegistryInput!): Boolean
  addServer(input: AddServerInput!): AddServerPayload
  cancelDeployment(id: String!): Boolean

  """
  Change the current user's password after verifying the current one. Returns true.
  """
  changePassword(currentPassword: String!, newPassword: String!): Boolean

  """
  Force an immediate re-resolution of the latest agent release from GitHub, bypassing the in-process cache. Returns the resolved expected agent version so the dashboard re-renders with fresh outdated badges. Use after publishing a new agent release rather than waiting out the cache TTL.
  """
  checkAgentUpdates: String

  """Re-run the upstream release check and return the latest update info."""
  checkForUpdates: UpdateInfo

  """First-run setup: create the first account + team. Signs in."""
  completeSetup(email: String!, name: String!, password: String!, teamName: String!, username: String!): AuthPayload

  """Create a backup schedule. Returns true."""
  createBackup(input: CreateBackupInput!): Boolean
  createDatabase(input: CreateDatabaseInput!): Database

  """
  Create a folder in the active team; nest it by passing a parent folder id.
  """
  createFolder(color: String, name: String!, parentId: ID): Folder
  createProject(input: CreateProjectInput!): Project

  """Create a new (empty) folder in the project files tree."""
  createProjectDir(path: String!, projectId: String!): FileEntry
  createS3(input: CreateS3Input!): S3Destination

  """Create a new team; the viewer becomes its owner and it is made active."""
  createTeam(name: String!): Team

  """
  Create a new API token. The raw secret is returned once in the payload.
  """
  createToken(name: String!): CreateTokenPayload

  """Delete a backup schedule. Returns true."""
  deleteBackup(id: String!): Boolean

  """Tear down the database container + volume. Returns true."""
  deleteDatabase(id: String!): Boolean

  """Delete an env var. Returns true."""
  deleteEnv(id: String!): Boolean

  """Delete a folder; its projects fall back to the top level."""
  deleteFolder(id: ID!): Boolean

  """Delete the project and tear down its stack. Returns true."""
  deleteProject(id: String!): Boolean

  """Delete a file or folder (recursively). Returns true."""
  deleteProjectFile(path: String!, projectId: String!): Boolean

  """
  Bulk-delete several projects (bounded-concurrency teardown + one write). Returns how many were deleted.
  """
  deleteProjects(ids: [ID!]!): Int

  """Delete a registry credential. Returns true."""
  deleteRegistry(id: String!): Boolean

  """Delete the S3 destination and its backups. Returns true."""
  deleteS3(id: String!): Boolean

  """Delete a shared env group. Returns true."""
  deleteSharedEnvGroup(id: String!): Boolean

  """
  Deploy the current dev workspace files to production. Returns the deployment id.
  """
  deployDevWorkspace(projectId: String!): String
  disableDev(projectId: String!): DevInfo
  enableDev(projectId: String!): DevInfo

  """
  Run a command in the project's live container (docker exec). Gated on the deploy capability — this is arbitrary code execution.
  """
  execConsole(input: ExecConsoleInput!): ExecResult

  """Bulk-import a .env-style blob; returns the number of vars imported."""
  importEnv(blob: String!, projectId: String!, targets: [EnvTarget!]!): Int

  """
  Install an app from the catalog (one per app per team; recreates the container in place if already installed). Mints no token — the caller supplies their own from Settings → API Tokens.
  """
  installApp(catalogId: String!): InstalledApp

  """Sign in with email + password. Sets the session cookie."""
  login(email: String!, password: String!): AuthPayload

  """Clear the session + active-team cookies."""
  logout: Boolean

  """
  Mint a single-use registration link. Returns the absolute /register URL.
  """
  mintRegistrationLink: String

  """
  Move a folder under a new parent folder, or to the top level when parentId is omitted/null. Rejects moving a folder into itself or a descendant.
  """
  moveFolder(id: ID!, parentId: ID): Boolean

  """
  Move a project into a folder, or back to the top level when folderId is omitted/null.
  """
  moveProjectToFolder(folderId: ID, projectId: ID!): Boolean

  """
  Bulk-move several projects into a folder (or to the top level when folderId is omitted/null) in one write. Returns how many moved.
  """
  moveProjectsToFolder(folderId: ID, projectIds: [ID!]!): Int

  """Promote a preview deployment to production."""
  promoteDeployment(id: String!): Boolean
  rebuildProject(id: String!): Project
  redeploy(projectId: String!): Deployment

  """
  Create a new account + team via a single-use registration link. Signs in.
  """
  registerThroughLink(email: String!, name: String!, password: String!, teamName: String!, token: String!, username: String!): AuthPayload

  """
  Mint a fresh install command for a server still provisioning (the original token expired or was lost).
  """
  reissueServerBootstrap(id: String!): AddServerPayload

  """Remove a dev SSH user. Returns true."""
  removeDevSshUser(id: String!): Boolean

  """Remove the domain so it stops routing. Returns true."""
  removeDomain(id: String!): Boolean

  """Disconnect a GitHub App and its installations. Returns true."""
  removeGithubApp(id: String!): Boolean

  """Remove a member from the active team. Returns true."""
  removeMember(userId: String!): Boolean

  """
  Disconnect and remove a remote server (revokes trust, best-effort teardown). Returns a warning string if the agent was unreachable, else null.
  """
  removeServer(id: String!): String

  """Rename a folder."""
  renameFolder(id: ID!, name: String!): Boolean
  renameProject(id: String!, name: String!): Project

  """Rename or move a file/folder within the project files tree."""
  renameProjectFile(newPath: String!, path: String!, projectId: String!): FileEntry

  """Render the docker-compose stack a project would deploy."""
  renderComposeStack(projectId: String!): String

  """Set the team-wide display order of folders in Overview."""
  reorderFolders(folderIds: [ID!]!): Boolean

  """Set the team-wide display order of projects in Overview."""
  reorderProjects(projectIds: [ID!]!): Boolean

  """DESTRUCTIVE: replace the workspace with a fresh copy of the source."""
  resetDevWorkspace(projectId: String!): DevInfo

  """Reveal the full (unmasked) connection string for a database."""
  revealConnection(id: String!): String

  """Reveal a single secret's plaintext value."""
  revealEnv(id: String!): String

  """
  Reveal the decrypted `.env` text for one shared group (prefills edits).
  """
  revealSharedEnvBlob(id: String!): String

  """Revoke a pending registration link. Returns true."""
  revokeRegistrationLink(id: String!): Boolean

  """Revoke (delete) an API token. Returns true."""
  revokeToken(id: String!): Boolean

  """Run a backup schedule manually now. Returns true."""
  runBackup(id: String!): Boolean

  """Replace the active team's notification settings."""
  saveNotificationSettings(input: JSON!): NotificationSettings

  """Create or update a shared env group; returns the saved group."""
  saveSharedEnvGroup(input: SaveSharedEnvGroupInput!): SharedEnvGroup
  setDatabaseRunning(id: String!, running: Boolean!): Database

  """
  Set a folder's accent colour (hex, e.g. #3b82f6), or clear it back to the default when color is omitted/null.
  """
  setFolderColor(color: String, id: ID!): Boolean

  """Make this domain its project's primary (canonical) host. Returns true."""
  setPrimaryDomain(id: String!): Boolean
  setProjectAutoDeploy(id: String!, value: Boolean!): Project

  """
  Replace a project's whole env set from the .env editor (upsert the given entries, delete the rest). New vars default to plain; unchanged secrets are preserved. Returns the resulting variable count.
  """
  setProjectEnv(defaultTargets: [EnvTarget!]!, entries: [EnvEntryInput!]!, projectId: String!): Int

  """
  Replace a single-container project's volumes (named, project-files, and host bind mounts).
  """
  setProjectVolumes(id: String!, volumes: [VolumeInput!]!): Project

  """Attach or detach a shared group to one project. Returns true."""
  setSharedEnvGroupAttachment(attached: Boolean!, groupId: String!, projectId: String!): Boolean

  """Start a stopped app's container. Returns true."""
  startApp(id: String!): Boolean
  startDev(projectId: String!): DevInfo

  """
  Begin the GitHub App manifest flow; returns the form's POST target, manifest and signed state.
  """
  startGithubConnect(org: String): GithubConnectStart
  startProject(id: String!): Project

  """Start the VS Code tunnel and return the device-login link."""
  startTunnel(projectId: String!): VscodeTunnelInfo

  """Stop a running app's container. Returns true."""
  stopApp(id: String!): Boolean
  stopDev(projectId: String!): DevInfo
  stopProject(id: String!): Project

  """Stop the VS Code tunnel (dev container keeps running). Returns true."""
  stopTunnel(projectId: String!): Boolean

  """Switch the active team (sets a cookie server-side). Returns true."""
  switchTeam(teamId: String!): Boolean

  """Send a one-off test alert through a single channel. Returns true."""
  testNotification(channel: TestNotificationChannel!): Boolean

  """Run a connectivity check (HEAD bucket) and return the dest."""
  testS3(id: String!): S3Destination

  """Enable or disable a backup schedule. Returns true."""
  toggleBackup(enabled: Boolean!, id: String!): Boolean

  """
  Uninstall an app: destroy its container + Traefik router and drop the row. Revokes nothing (the app held no token). Returns true.
  """
  uninstallApp(id: String!): Boolean
  updateDev(patch: UpdateDevInput!, projectId: String!): DevInfo

  """
  Apply a full edit to a domain and return the updated domain (reloaded).
  """
  updateDomain(id: String!, patch: DomainPatchInput!): Domain

  """
  Change the current user's email after re-checking their password. Returns true.
  """
  updateEmail(currentPassword: String!, email: String!): Boolean

  """Change a member's role and/or capabilities."""
  updateMember(input: UpdateMemberInput!): Member

  """Update the current user's display name. Returns true."""
  updateProfile(name: String!): Boolean
  updateProjectBuild(build: BuildConfigInput!, id: String!): Project
  updateProjectLogo(id: String!, logo: String): Project
  updateProjectSource(id: String!, input: UpdateSourceInput!): Project

  """
  Update this server's agent binary in place to the latest released version WITHOUT reissuing its certificates — the agent self-updates over its existing pinned-mTLS channel and re-execs keeping the same on-disk trust materials, so the server stays online with the same identity. Returns the version the agent is now running. Errors clearly when the server is unreachable/unprovisioned, or — until the agent ships the self-update RPC — when its agent is too old to update itself remotely (re-run the installer to upgrade it for now).
  """
  updateServerAgent(id: String!): String
  updateTeam(input: UpdateTeamInput!): Team

  """Edit a user's instance-admin flag, suspended state, and password."""
  updateUserAdmin(input: UpdateUserAdminInput!): UserDetail

  """Upload a file from a base64 body (used for binary files)."""
  uploadProjectFile(base64: String!, path: String!, projectId: String!): FileEntry

  """Create or update an env var, then return the stored entity."""
  upsertEnv(input: UpsertEnvInput!): EnvVar

  """Re-check the domain's DNS and (re)issue its certificate."""
  verifyDomain(id: String!): Domain

  """Create or overwrite a text file in the project files tree."""
  writeProjectFile(content: String!, path: String!, projectId: String!): FileEntry
}

"""Per-team notification channels + per-event delivery toggles."""
type NotificationSettings {
  """
  Channel config map: push/email/discord/webhook enable flags + endpoints.
  """
