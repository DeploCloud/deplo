  """
  Diagnostic: how the request authenticated and the active team. Useful when testing token auth.
  """
  apiContext: JSON

  """All API tokens in the active team."""
  apiTokens: [ApiToken!]

  """The remote catalog of installable apps."""
  appCatalog: [AppListing!]

  """
  Every team in the instance, for the server team-access picker. Requires manage_infra.
  """
  assignableTeams: [Team!]

  """
  Recorded backup runs for one target (a service OR a database), newest first. Pass exactly one of serviceId / databaseId.
  """
  backupRuns(databaseId: String, serviceId: String): [BackupRun!]

  """All backup schedules in the active team, newest first."""
  backups: [Backup!]

  """
  Basic-auth users of a service, alphabetical by username (requires manage_domains).
  """
